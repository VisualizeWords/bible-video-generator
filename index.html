<!DOCTYPE html>
<html>
<head>
  <title>Bible Story Video Generator</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f2f2f2;
    }
    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      font-size: 16px;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
    }
    video {
      margin-top: 20px;
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <h2>Bible Story to Video</h2>
  <p>Enter your Bible story:</p>
  <textarea id="storyText" placeholder="e.g., Elijah confronts Ahab..."></textarea>
  <br>
  <button onclick="generateVideo()">Generate Video</button>
  <div id="videoContainer" style="display:none;">
    <h3>Generated Video:</h3>
    <video id="videoPlayer" controls>
      <source src="https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <br>
    <a id="downloadLink" href="" download="bible_story_video.mp4">
      <button>Download Video</button>
    </a>
  </div>

  <script>
    function generateVideo() {
      const story = document.getElementById('storyText').value.trim();
      if (!story) {
        alert("Please enter a Bible story.");
        return;
      }

      // Simulate video generation (replace with real API in future)
      document.getElementById('videoContainer').style.display = 'block';
      document.getElementById('downloadLink').href = "https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4";
    }
  </script>
</body>
</html>
