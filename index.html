<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bible Story Video Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    textarea {
      width: 100%;
      height: 120px;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-bottom: 15px;
    }
    video {
      width: 100%;
      margin-top: 15px;
      display: none;
    }
  </style>
</head>
<body>
  <h2>Bible Story to Video</h2>
  <textarea id="storyInput" placeholder="Enter Bible story here..."></textarea>
  <button onclick="generateVideo()">Generate Video</button>
  <div id="status"></div>
  <video id="videoPlayer" controls></video>
  <a id="downloadLink" href="#" download="bible-story.mp4" style="display:none;">Download Video</a>

  <script>
    async function generateVideo() {
      const story = document.getElementById('storyInput').value;
      const status = document.getElementById('status');
      const videoPlayer = document.getElementById('videoPlayer');
      const downloadLink = document.getElementById('downloadLink');

      if (!story) {
        alert("Please enter a Bible story.");
        return;
      }

      status.textContent = "Generating video... please wait.";
      videoPlayer.style.display = "none";
      downloadLink.style.display = "none";

      try {
        // Replace with real API when available
        const fakeVideoUrl = "https://www.w3schools.com/html/mov_bbb.mp4"; // sample video
        await new Promise(r => setTimeout(r, 2000)); // simulate processing

        videoPlayer.src = fakeVideoUrl;
        videoPlayer.style.display = "block";

        downloadLink.href = fakeVideoUrl;
        downloadLink.style.display = "inline-block";
        status.textContent = "Video ready!";
      } catch (err) {
        status.textContent = "Failed to generate video.";
        console.error(err);
      }
    }
  </script>
</body>
</html>
