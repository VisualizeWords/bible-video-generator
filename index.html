<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bible Story Visualizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-bottom: 15px;
    }

    .video-box {
      width: 100%;
      height: 300px;
      overflow: hidden;
      margin-top: 15px;
      position: relative;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .fake-video {
      width: 100%;
      height: auto;
      animation: zoomIn 10s ease-in-out forwards;
    }

    @keyframes zoomIn {
      from {
        transform: scale(1);
      }
      to {
        transform: scale(1.2);
      }
    }

    #downloadLink {
      display: none;
      margin-top: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h2>Bible Story Visualizer</h2>
  <textarea id="storyInput" placeholder="Enter Bible story text..."></textarea>
  <br>
  <button onclick="simulateVideo()">Generate Visual</button>
  <div class="video-box" id="videoBox" style="display:none;">
    <img id="fakeVideo" class="fake-video" src="" alt="Bible Scene">
  </div>
  <a id="downloadLink" href="#" download="bible-scene.jpg">Download Image</a>

  <script>
    function simulateVideo() {
      const story = document.getElementById('storyInput').value;
      const fakeVideo = document.getElementById('fakeVideo');
      const videoBox = document.getElementById('videoBox');
      const downloadLink = document.getElementById('downloadLink');

      if (!story.trim()) {
        alert("Please enter a Bible story.");
        return;
      }

      // Use a static placeholder image for now
      const placeholderImage = "https://images.unsplash.com/photo-1601758173925-8d4805bdfb65"; // Replace later

      fakeVideo.src = placeholderImage;
      videoBox.style.display = "block";
      downloadLink.href = placeholderImage;
      downloadLink.style.display = "inline-block";
    }
  </script>
</body>
</html>
