<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bible Story to Video</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: auto; padding: 20px; text-align: center; }
    textarea { width: 100%; height: 100px; margin-bottom: 10px; font-size: 16px; padding: 10px; }
    button { padding: 10px 20px; font-size: 16px; }
    video { width: 100%; margin-top: 20px; border-radius: 10px; border: 2px solid #444; display: none; }
    #loading { display: none; font-style: italic; color: green; }
  </style>
</head>
<body>
  <h2>Bible Story to AI Video (Zeroscope)</h2>
  <textarea id="promptInput" placeholder="Enter your Bible story text here..."></textarea><br>
  <button onclick="generateVideo()">Generate Video</button>
  <p id="loading">Generating video, please wait...</p>
  <video id="videoPlayer" controls></video>

  <script src="script.js"></script>
</body>
</html>
